<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Leaderboard & Giveaways</title>

<style>
body {
  font-family: Arial;
  background: #0f0f0f;
  color: #fff;
  text-align: center;
}

/* TABLE */
table {
  border-collapse: collapse;
  width: 60%;
  margin: 30px auto;
}
th, td {
  padding: 10px;
  border: 1px solid #333;
}
th { background: #1f1f1f; }
tr:nth-child(even) { background: #181818; }

/* GIVEAWAY BOXES */
.container {
  display: flex;
  justify-content: center;
  gap: 30px;
  flex-wrap: wrap;
}

.giveaway {
  margin-top: 20px;
  padding: 20px;
  background: #181818;
  border-radius: 10px;
  width: 350px;
}

/* BUTTON */
button {
  padding: 10px 20px;
  background: gold;
  border: none;
  cursor: pointer;
  font-weight: bold;
  margin-top: 10px;
}

/* ANIMATION */
.animationBox {
  margin-top: 15px;
  font-size: 18px;
  height: 40px;
}
</style>
</head>

<body>

<h1>🏆 Leaderboard</h1>

<table id="leaderboard">
<thead>
<tr>
<th>Rank</th>
<th>Username</th>
<th>Points</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h1>🎁 Giveaways</h1>

<div class="container">

  <!-- WEEKLY -->
  <div class="giveaway">
    <h2 id="wTitle">Weekly</h2>
    <img id="wImage" width="200"><br>
    <p id="wPrize"></p>
    <p id="wCountdown"></p>
    <p id="wWinner"></p>

    <button onclick="mockDraw('weekly')">🎡 Try Weekly Luck</button>
    <div id="wAnim" class="animationBox"></div>
  </div>

  <!-- MONTHLY -->
  <div class="giveaway">
    <h2 id="mTitle">Monthly</h2>
    <img id="mImage" width="200"><br>
    <p id="mPrize"></p>
    <p id="mCountdown"></p>
    <p id="mWinner"></p>

    <button onclick="mockDraw('monthly')">🎡 Try Monthly Luck</button>
    <div id="mAnim" class="animationBox"></div>
  </div>

</div>

<script>
let leaderboardData = [];
let giveawayData = {};

// =========================
// LOAD LEADERBOARD
// =========================
async function loadLeaderboard() {
  const url = 'https://raw.githubusercontent.com/dtrix381/TFS/main/leaderboard.json?t=' + Date.now();
  const res = await fetch(url);
  leaderboardData = await res.json();

  const tbody = document.querySelector("#leaderboard tbody");
  tbody.innerHTML = '';

  leaderboardData.forEach((user, index) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${index + 1}</td>
      <td>${user.username}</td>
      <td>${user.points}</td>
    `;
    tbody.appendChild(tr);
  });
}

// =========================
// LOAD GIVEAWAYS
// =========================
async function loadGiveaway() {
  const url = 'https://raw.githubusercontent.com/dtrix381/TFS/main/giveaway_data.json?t=' + Date.now();
  const res = await fetch(url);
  giveawayData = await res.json();

  updateUI("weekly", "w");
  updateUI("monthly", "m");
}

function updateUI(type, prefix) {
  const g = giveawayData[type];

  document.getElementById(prefix + "Title").innerText = g.title;
  document.getElementById(prefix + "Prize").innerText = "🎁 " + g.prize;
  document.getElementById(prefix + "Image").src = g.thumbnail;
  document.getElementById(prefix + "Winner").innerText =
    "🏆 Last: " + (g.last_winner || "None");

  updateCountdown(type, prefix);
}

// =========================
// COUNTDOWN
// =========================
function updateCountdown(type, prefix) {
  const el = document.getElementById(prefix + "Countdown");
  const g = giveawayData[type];

  if (!g.end_time) {
    el.innerText = "⏳ Not set";
    return;
  }

  const end = new Date(g.end_time);
  const now = new Date();
  const diff = end - now;

  if (diff <= 0) {
    el.innerText = "🎉 Drawing...";
    return;
  }

  const h = Math.floor(diff / 1000 / 60 / 60);
  const m = Math.floor((diff / 1000 / 60) % 60);
  const s = Math.floor((diff / 1000) % 60);

  el.innerText = `⏳ ${h}h ${m}m ${s}s`;
}

// =========================
// 🎡 MOCK DRAW
// =========================
function mockDraw(type) {
  const box = document.getElementById(type === "weekly" ? "wAnim" : "mAnim");

  let spins = 25;
  let i = 0;

  const interval = setInterval(() => {
    const randomUser = leaderboardData[Math.floor(Math.random() * leaderboardData.length)];
    box.innerText = "🎲 " + randomUser.username;

    i++;

    if (i >= spins) {
      clearInterval(interval);

      const winner = weightedPick();
      box.innerText = "🏆 WINNER: " + winner.username;
    }
  }, 80);
}

// =========================
// WEIGHTED PICK
// =========================
function weightedPick() {
  let total = leaderboardData.reduce((sum, u) => sum + u.points, 0);
  let r = Math.random() * total;

  let upto = 0;
  for (let u of leaderboardData) {
    if (upto + u.points >= r) return u;
    upto += u.points;
  }
}

// =========================
// AUTO REFRESH
// =========================
loadLeaderboard();
loadGiveaway();

setInterval(loadLeaderboard, 60000);
setInterval(loadGiveaway, 60000);
setInterval(() => {
  updateCountdown("weekly", "w");
  updateCountdown("monthly", "m");
}, 1000);
</script>

</body>
</html>
