<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bonus Hunt Overlay</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

  <style>
    body {
      margin: 0;
      background: transparent;
      font-family: 'Orbitron', sans-serif;
      font-size: 30px;
      color: white;
    }

    .overlay-container {
      width: 700px;
      height: 800px;
      margin: 0 auto;
      padding: 20px;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 20px;
      border: 2px solid gold;
      box-shadow: 0 0 15px gold;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      overflow: hidden;
      text-align: center;
    }

    h1 {
      color: #00ffff;
      text-shadow: 0 0 10px #00ffff;
      margin-bottom: 10px;
    }

    .header-stats {
      background-color: rgba(0, 0, 0, 0.7);
      border: 2px solid #444;
      border-radius: 12px;
      padding: 15px 30px;
      margin-bottom: 15px;
      display: inline-block;
      text-align: left;
      box-shadow: 0 0 20px #00ffff44;
    }

    .header-stats div { margin: 5px 0; }

    .profit-positive { color: #00ff99; font-weight: bold; }
    .profit-negative { color: #ff4d4d; font-weight: bold; }
    .highlight-slot { color: #ffd700; text-shadow: 0 0 10px #ffd700; }
    .highlight-value { color: #1ec8ff; text-shadow: 0 0 10px #1ec8ff; }

    .stat-value { font-size: 32px; font-weight: bold; }

    .bonus-scroll-wrapper {
      flex-grow: 1;
      overflow: hidden;
      position: relative;
      border-top: 2px solid #444;
      margin-top: 10px;
    }

    .bonus-scroll {
      display: flex;
      flex-direction: column;
      animation: scrollUp 20s linear infinite;
    }

    @keyframes scrollUp {
      0%   { transform: translateY(0); }
      100% { transform: translateY(-50%); }
    }

    .bonus-entry {
      padding: 10px 0;
      font-size: 28px;
      color: white;
      text-shadow: 0 0 4px black;
    }

    .upcoming-container {
      background: rgba(0, 0, 0, 0.6);
      margin-top: 10px;
      padding: 10px 15px;
      border: 2px solid #333;
      border-radius: 10px;
      font-size: 26px;
    }

    .upcoming-container span {
      font-weight: bold;
      color: gold;
      text-shadow: 0 0 5px gold;
    }

.entry-row {
  display: flex;
  align-items: center;
  justify-content: flex-start;
  gap: 10px;
  padding: 8px 0;
  font-size: 26px;
}

.entry-thumb {
  width: 42px;
  height: 28px;
  border-radius: 6px;
  object-fit: contain;
  background: rgba(0,0,0,0.4);
  border: 1px solid #333;
}

.big-current {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 8px;
  padding: 10px;
  border: 2px solid gold;
  border-radius: 10px;
  background: rgba(0,0,0,0.5);
animation: popIn 0.4s ease;
}

@keyframes popIn {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.big-current img {
  width: 160px;
  height: 90px;
  object-fit: contain;
  border-radius: 10px;
  border: 2px solid #444;
  margin-bottom: 6px;
}

  </style>
</head>
<body>
  <div class="overlay-container">
    <h1 id="huntTitleHeader">TFS BONUS HUNT LIVE</h1>

    <div class="header-stats">
      <div id="startingBalance">Starting Balance: $0.00</div>
      <div id="finalBalance">Final Balance: $0.00</div>
      <div id="profit">Profit: $0.00</div>
      <div id="highestProfit">Best Profit: -</div>
      <div id="highestMulti">Best X: -</div>
      <div id="bonusesOpened">Bonuses: 0 / 0</div>
    </div>

    <div class="upcoming-container" id="upcomingSection">
      Loading bonus order...
    </div>

    <div class="bonus-scroll-wrapper">
      <div class="bonus-scroll" id="bonusTrack"></div>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get("user");

    const authorized = ["488015447417946151", "1037485428921606185", "927475447464329236", "898589521711616070"]; // Add more IDs as needed
    if (!userId || !authorized.includes(userId)) {
      document.body.innerHTML = `<h2 style="color:red;text-align:center">❌ Not Authorized!<br>Contact TeamFullSend</h2>`;
      throw new Error("Unauthorized");
    }

    const firebaseConfig = {
      apiKey: "AIzaSyCGCiv3p9KgjXR7yCA8Z2JYMhPweDRnQPk",
      authDomain: "tfs-hunt-tracker.firebaseapp.com",
      projectId: "tfs-hunt-tracker"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function formatCurrency(num) {
      return `$${(+num).toFixed(2)}`;
    }

    db.collection("hunts").doc(userId).onSnapshot(doc => {
      if (!doc.exists) return;
      const data = doc.data();
	document.getElementById("huntTitleHeader").textContent = (data.title || "TFS BONUS HUNT LIVE").trim();
      const slots = data.slots || [];

      let totalPay = 0;
      let bestSlot = '-', bestXSlot = '-';
      let highestPay = 0, highestX = 0;

      const track = document.getElementById("bonusTrack");
 track.innerHTML = ""; // Clear the track before rendering

const allEntries = []; // ✅ This line was missing

slots.forEach((slot, i) => {
  totalPay += slot.totalPay;

  if (slot.totalPay > highestPay) {
    highestPay = slot.totalPay;
    bestSlot = slot.slotName;
  }

  if (slot.totalX > highestX) {
    highestX = slot.totalX;
    bestXSlot = slot.slotName;
  }

  const entry = document.createElement("div");
  entry.className = "bonus-entry";
  entry.innerHTML = `
  <div class="entry-row">
    <img class="entry-thumb" src="${slot.thumbnail || 'https://i.imgur.com/IR08Bjy.png'}">
    <div>
      <strong>${i + 1}.</strong>
      <span class="highlight-slot">${slot.slotName}</span>
      — $${slot.betSize.toFixed(2)}
      — $${slot.totalPay.toFixed(2)}
      (<span class="highlight-value">${slot.totalX.toFixed(2)}x</span>)
    </div>
  </div>
`;
  allEntries.push(entry);
  track.appendChild(entry);
});

// 🔁 Duplicate the same entries for infinite loop
allEntries.forEach(entry => {
  const clone = entry.cloneNode(true);
  track.appendChild(clone);
});

      const profit = totalPay - (data.startingBalance || 0);
      const profitClass = profit >= 0 ? 'profit-positive' : 'profit-negative';

      document.getElementById("startingBalance").textContent = `Starting Balance: ${formatCurrency(data.startingBalance || 0)}`;
      document.getElementById("finalBalance").textContent = `Final Balance: ${formatCurrency(totalPay)}`;
      document.getElementById("profit").innerHTML = `Profit: <span class='${profitClass}'>${formatCurrency(profit)}</span>`;
      document.getElementById("highestProfit").innerHTML =
  `Best Profit:
   <img src="${slots.find(s => s.slotName === bestSlot)?.thumbnail || 'https://i.imgur.com/IR08Bjy.png'}"
        style="width:50px;height:32px;object-fit:contain;vertical-align:middle;margin:0 6px;border-radius:6px;">
   <span class='highlight-slot'>${bestSlot}</span>
   <span class='highlight-value'>(${formatCurrency(highestPay)})</span>`;
      document.getElementById("highestMulti").innerHTML =
  `Best X:
   <img src="${slots.find(s => s.slotName === bestXSlot)?.thumbnail || 'https://i.imgur.com/IR08Bjy.png'}"
        style="width:50px;height:32px;object-fit:contain;vertical-align:middle;margin:0 6px;border-radius:6px;">
   <span class='highlight-slot'>${bestXSlot}</span>
   <span class='highlight-value'>(${highestX.toFixed(2)}x)</span>`;
      const openedCount = slots.filter(slot => slot.opened === true).length;
	document.getElementById("bonusesOpened").textContent = `Bonuses: ${openedCount} / ${slots.length}`;

      const upcoming = document.getElementById("upcomingSection");
      const nextToOpenIndex = slots.findIndex(slot => slot.opened === false || typeof slot.opened === 'undefined');
      const currentSlot = slots[nextToOpenIndex];
      const nextSlot = slots[nextToOpenIndex + 1];

      const isOpening = data.isOpening || false;

if (!isOpening) {
  // 🟡 HUNTING MODE (clean, no big image)
  upcoming.innerHTML = `
    <div style="
      font-size: 24px;
      text-align:center;
      padding: 10px;
      color: #00ffff;
      text-shadow: 0 0 8px #00ffff;
    ">
      🟡 STILL HUNTING
    </div>
    <div style="font-size:20px; margin-top:5px;">
      Bonuses Collected: <span style="color:gold;">${slots.length}</span>
    </div>
  `;
} else {
  // 🔴 OPENING MODE (your existing big layout)
  if (currentSlot) {
    upcoming.innerHTML = `
      <div class="big-current">
        <img src="${currentSlot.thumbnail || 'https://i.imgur.com/IR08Bjy.png'}">
        <div>
          🎰 NOW OPENING<br>
          <strong>${currentSlot.slotName}</strong>
        </div>
        <div style="color:gold;">
          NEXT: ${nextSlot ? nextSlot.slotName : 'DONE'}
        </div>
      </div>
    `;
  } else {
    upcoming.innerHTML = `✅ All bonuses opened`;
  }
}
    });
  </script>
</body>
</html>
